<script  id="ch0103/17">
x1 = +prompt('x1:')
y1 = +prompt('y1:')
x2 = +prompt('x2:')
y2 = +prompt('y2:')
x3 = +prompt('x3:')
y3 = +prompt('y3:')

xa = x2 - x1
ya = y2 - y1
xb = x2 - x3
yb = y2 - y3
xc = x1 - x3
yc = y1 - y3

l1 = Math.sqrt(xa ** 2 + ya ** 2)
l2 = Math.sqrt(xb ** 2 + yb ** 2)
l3 = Math.sqrt(xc ** 2 + yc ** 2)

s = Math.sqrt(p * (p - l1) * (p - l2) * (p - l3))

console.log(s.toFixed(2))

</script>
