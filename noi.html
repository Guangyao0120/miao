<script id="ch0104/20">
var a = +prompt('a:')
var b = +prompt('b:')
var c = +prompt('c:')

delta = (b * b - 4 * a * c) ** 0.5
x = - b / 2 / a

if(delta > 0){
    x1 = (b + delta) / 2 / a
    x2 = (b - delta) / 2 / a
    m = Math.max(x1 , x2)
    n = Math.min(x1 , x2)
    alert('x1=' + m.toFixed(5) + ';x2=' + n.toFixed(5))
}else if(delta = 0){ 
    alert('x1=x2=' + x.toFixed(5))
}else{
    i1 = (4 * a * c - b * b) ** 0.5 / 2 / a
    i2 = (4 * a * c - b * b) ** 0.5 / (-2) / a
    p = Math.max(i1 , i2)
    q = Math.min(i1 , i2)
    alert("x1=" + x.toFixed(5) + '+' + p.toFixed(5) + 'i;x2=' + x.toFixed(5) + q.toFixed(5) + 'i')
}

</script>
